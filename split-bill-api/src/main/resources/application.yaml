server:
  port: 4110

spring:
  application:
    name: split-bill-api

  datasource:
    url: jdbc:h2:mem:splitbill;IFEXISTS=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
